<svg xmlns="http://www.w3.org/2000/svg" width="820" height="500" viewBox="0 0 820 500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="vibe-learn example: a Learn block with key takeaways followed by a quick check quiz">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1733"/>
      <stop offset="1" stop-color="#14111f"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="804" height="484" rx="14" fill="url(#bg)" stroke="#2e2a44"/>
  <!-- title bar -->
  <rect x="8" y="8" width="804" height="40" rx="14" fill="#241f3b"/>
  <rect x="8" y="34" width="804" height="14" fill="#241f3b"/>
  <circle cx="32" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="6" fill="#febc2e"/>
  <circle cx="72" cy="28" r="6" fill="#28c840"/>
  <text x="410" y="32" text-anchor="middle" fill="#8a85a6" font-size="13">vibe-learn · learn while you vibe code</text>

  <!-- illustrative label -->
  <text x="788" y="70" text-anchor="end" fill="#54506e" font-size="11" font-style="italic">illustrative example</text>

  <!-- prompt line -->
  <text x="32" y="84" fill="#6f6a8d" font-size="14">$ wrote <tspan fill="#9d97c4">getUser()</tspan> data fetcher…</text>

  <!-- Learn block -->
  <text x="32" y="124" fill="#c9a3ff" font-size="16" font-weight="700">🎓 Learn — async/await + error handling</text>
  <text x="48" y="154" fill="#d7d3ec" font-size="13.5">• <tspan fill="#7ee0c0">await</tspan> pauses here until <tspan fill="#7ee0c0">fetch</tspan> resolves — <tspan fill="#d7d3ec">res</tspan> is the real response,</text>
  <text x="62" y="174" fill="#d7d3ec" font-size="13.5">not a pending Promise.</text>
  <text x="48" y="200" fill="#d7d3ec" font-size="13.5">• <tspan fill="#7ee0c0">res.ok</tspan> is false for 4xx/5xx. <tspan fill="#7ee0c0">fetch</tspan> does NOT throw on those —</text>
  <text x="62" y="220" fill="#d7d3ec" font-size="13.5">only on network failure — so we throw manually.</text>
  <text x="48" y="248" fill="#8f8ab0" font-size="13"><tspan fill="#b6b1d4" font-weight="700">Why it matters:</tspan> forgetting the res.ok check is the classic bug</text>
  <text x="62" y="266" fill="#8f8ab0" font-size="13">where a 404 silently becomes "undefined data" downstream.</text>

  <!-- divider -->
  <line x1="32" y1="290" x2="788" y2="290" stroke="#2e2a44" stroke-dasharray="4 4"/>

  <!-- Quiz block -->
  <text x="32" y="320" fill="#9fd0ff" font-size="16" font-weight="700">📝 Quick check <tspan fill="#6f6a8d" font-weight="400" font-size="13">(optional — answer, or say skip/next)</tspan></text>
  <text x="48" y="350" fill="#d7d3ec" font-size="13.5">1.  Why doesn't <tspan fill="#7ee0c0">fetch</tspan> throw on a 404 by itself?</text>
  <text x="48" y="376" fill="#d7d3ec" font-size="13.5">2.  Caller does <tspan fill="#9d97c4">await getUser(5)</tspan> — what happens if the user</text>
  <text x="68" y="396" fill="#d7d3ec" font-size="13.5">doesn't exist?</text>
  <text x="48" y="422" fill="#d7d3ec" font-size="13.5">3.  How would you add a timeout so this can't hang forever?</text>

  <!-- footer -->
  <line x1="32" y1="446" x2="788" y2="446" stroke="#2e2a44"/>
  <text x="32" y="472" fill="#6f6a8d" font-size="12.5">ships the code <tspan fill="#54506e">+</tspan> understands it · non-blocking · beginner / intermediate / advanced</text>
</svg>
